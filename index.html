<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Classroom</title>

<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(to right,#eef2ff,#ffffff);}
header{background:#4338ca;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
nav{background:#4f46e5;padding:10px;text-align:center;display:none;}
nav button{margin:5px;padding:8px 14px;border:none;border-radius:6px;background:white;cursor:pointer;font-weight:bold;}
section{padding:20px;display:none;}
.card{background:white;padding:12px;margin:10px 0;border-radius:8px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button.action{background:#4338ca;color:white;}
.delete-btn{background:red;color:white;padding:5px 10px;border:none;border-radius:5px;margin-top:6px;}
</style>
</head>

<body>

<header>📚 Firebase Classroom</header>

<section id="login" style="display:block;">
<h3>Login</h3>
<select id="role">
<option value="">Select Role</option>
<option value="teacher">Teacher</option>
<option value="student">Student</option>
</select>
<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button class="action" onclick="login()">Login</button>
<p id="msg"></p>
</section>

<nav id="menu">
<button onclick="showSection('assignments')">Assignment</button>
<button onclick="showSection('events')">Event</button>
<button onclick="showSection('timetable')">Timetable</button>
<button onclick="showSection('questionpapers')">Question Papers</button>
<button onclick="showSection('attendance')">Attendance</button>
<button onclick="showSection('marks')">Marks</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- ASSIGNMENT -->
<section id="assignments">
<div class="upload-area teacher-only">
<h3>Add Assignment</h3>
<input type="text" id="asText">
<input type="file" id="asPhoto">
<button class="action" onclick="addData('assignments','asText','asPhoto')">Add</button>
</div>
<div id="asList"></div>
</section>

<!-- EVENTS -->
<section id="events">
<div class="upload-area teacher-only">
<h3>Add Event</h3>
<input type="text" id="evText">
<input type="file" id="evPhoto">
<button class="action" onclick="addData('events','evText','evPhoto')">Add</button>
</div>
<div id="evList"></div>
</section>

<!-- TIMETABLE -->
<section id="timetable">
<div class="upload-area teacher-only">
<h3>Add Timetable</h3>
<input type="text" id="ttText">
<input type="file" id="ttPhoto">
<button class="action" onclick="addData('timetable','ttText','ttPhoto')">Add</button>
</div>
<div id="ttList"></div>
</section>

<!-- QUESTION PAPERS -->
<section id="questionpapers">
<div class="upload-area teacher-only">
<h3>Add Question Paper</h3>
<input type="text" id="qpText">
<input type="file" id="qpPhoto">
<button class="action" onclick="addData('questionpapers','qpText','qpPhoto')">Add</button>
</div>
<div id="qpList"></div>
</section>

<!-- ATTENDANCE -->
<section id="attendance">

<div class="upload-area teacher-only">
<h3>Add Attendance</h3>

<input type="text" id="attName" placeholder="Student Name">

<button class="action" onclick="addAttendance()">
Add Student
</button>

</div>

<div id="attList"></div>

</section>

<!-- MARKS -->
<section id="marks">

<div class="upload-area teacher-only">

<h3>Add Marks</h3>

<input type="text"
id="studentName"
placeholder="Student Name">

<div id="subjectsContainer">

<div class="subjectRow">

<input type="text"
class="subject"
placeholder="Subject">

<input type="number"
class="mark"
placeholder="Mark">

</div>

</div>

<button class="action"
onclick="addSubjectField()">
+ Add Subject
</button>

<button class="action"
onclick="addMarks()">
Save Marks
</button>

</div>

<div id="marksList"></div>

</section>
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBi1n7JXVJyS7dGjELomCbWQCe6Vd-QvSY",
  authDomain: "classroomapp-43dd8.firebaseapp.com",
  projectId: "classroomapp-43dd8"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentRole = "";

/* LOGIN */
function login(){
  let role=document.getElementById("role").value;
  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;

  if(role==="teacher"){
    auth.signInWithEmailAndPassword(email,password)
    .then(()=>{ currentRole="teacher"; openApp(); })
    .catch(e=>msg(e.message));
  }

  if(role==="student"){
    if(email==="student@gmail.com" && password==="1234"){
      currentRole="student";
      openApp();
    } else msg("Invalid student login");
  }
}

function msg(t){ document.getElementById("msg").innerText=t; }

function openApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("menu").style.display="block";
  showSection("assignments");
  loadAll();

  if(currentRole==="student"){
    document.querySelectorAll(".teacher-only").forEach(e=>e.style.display="none");
  }
}

function logout(){ auth.signOut(); location.reload(); }

function showSection(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ADD IMAGE DATA */
function addData(col,textId,fileId){
  let text=document.getElementById(textId).value;
  let file=document.getElementById(fileId).files[0];

  if(!file||!text) return alert("Fill all");

  let reader=new FileReader();
  reader.onload=e=>{
    let img=new Image();
    img.src=e.target.result;

    img.onload=()=>{
      let canvas=document.createElement("canvas");
      let scale=600/img.width;
      canvas.width=600;
      canvas.height=img.height*scale;

      let ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      let data=canvas.toDataURL("image/jpeg",0.6);

      db.collection(col).add({
        text,
        photo:data,
        createdAt:new Date()
      }).then(loadAll);
    };
  };
  reader.readAsDataURL(file);
}

/* DELETE */
function deleteData(col,id){
  if(currentRole!=="teacher") return;
  db.collection(col).doc(id).delete().then(loadAll);
}

/* LOAD */
function loadAll(){
  loadCollection("assignments","asList");
  loadCollection("events","evList");
  loadCollection("timetable","ttList");
  loadCollection("questionpapers","qpList");
  loadAttendance();
  loadMarks();
}

function loadCollection(col,el){
  let box=document.getElementById(el);
  box.innerHTML="";

  db.collection(col).orderBy("createdAt","desc").get()
  .then(snap=>{
    snap.forEach(doc=>{
      let d=doc.data();
      box.innerHTML+=`
        <div class="card">
          <b>${d.text}</b><br>
          <img src="${d.photo}">
          ${currentRole==="teacher"
            ? `<br><button class="delete-btn" onclick="deleteData('${col}','${doc.id}')">Delete</button>`
            : ""}
        </div>`;
    });
  });
}

/* ATTENDANCE */
function addAttendance(){

let name=document.getElementById("attName").value;

if(!name) return alert("Enter Name");

db.collection("attendance").add({
name:name,
present:null,
createdAt:new Date()
})
.then(()=>{
document.getElementById("attName").value="";
loadAttendance();
});

}

function toggleAttendance(id,value){

db.collection("attendance")
.doc(id)
.update({
present:value
});

}

function deleteAttendance(id){

if(confirm("Delete Attendance?")){

db.collection("attendance")
.doc(id)
.delete();

}

}

function loadAttendance(){

let box=document.getElementById("attList");

db.collection("attendance")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

box.innerHTML="";

snapshot.forEach(doc=>{

let d=doc.data();

box.innerHTML+=`

<div class="card">

<b>${d.name}</b>

<br><br>

<button
style="
width:35px;
height:35px;
font-size:12px;
border-radius:8px;
border:2px solid green;
background:${d.present===true?'green':'white'};
color:${d.present===true?'white':'green'};
"
onclick="toggleAttendance('${doc.id}',true)"
>
✔ 
</button>

<button
style="
width:35px;
height:35px;
font-size:12px;
border-radius:8px;
border:2px solid red;
margin-left:10px;
background:${d.present===false?'red':'white'};
color:${d.present===false?'white':'red'};
"
onclick="toggleAttendance('${doc.id}',false)"
>
✖ 
</button>

<button
class="delete-btn"
onclick="deleteAttendance('${doc.id}')"
>
Delete
</button>

</div>

`;

});

});

}
/* MARKS */
function addMarks(){

let name =
document.getElementById("studentName").value;

if(!name){

alert("Enter Student Name");
return;

}

let subjects=[];

let subFields =
document.querySelectorAll(".subject");

let markFields =
document.querySelectorAll(".mark");

for(let i=0;i<subFields.length;i++){

let sub=subFields[i].value;
let mark=markFields[i].value;

if(sub && mark){

subjects.push({

subject:sub,
mark:Number(mark)

});

}

}

db.collection("marks").add({

name:name,
subjects:subjects,
createdAt:new Date()

})
.then(()=>{

alert("Saved Successfully");

document.getElementById("studentName").value="";

document.getElementById("subjectsContainer").innerHTML=`
<div class="subjectRow">
<input type="text"
class="subject"
placeholder="Subject">

<input type="number"
class="mark"
placeholder="Mark">
</div>
`;

});

}

function deleteMark(id){

if(confirm("Delete Mark?")){

db.collection("marks")
.doc(id)
.delete();

}

}
function addSubjectField(){

let container =
document.getElementById("subjectsContainer");

container.innerHTML += `

<div class="subjectRow">

<input
type="text"
class="subject"
placeholder="Subject">

<input
type="number"
class="mark"
placeholder="Mark">

</div>

`;

  }

function loadMarks(){

let box=document.getElementById("marksList");

db.collection("marks")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

box.innerHTML="";

snapshot.forEach(doc=>{

let d=doc.data();

let html=`
<div class="card">

<b>${d.name}</b>

<br><br>
`;

if(d.subjects){

d.subjects.forEach(s=>{

html+=`

<div style="
display:inline-block;
width:40px;
height:40px;
border:2px solid #4338ca;
border-radius:8px;
padding:5px;
margin:4px;
text-align:center;
">

${s.subject}
<br>
<b>${s.mark}</b>

</div>

`;

});

}

html+=`

<br>

<button
class="delete-btn"
onclick="deleteMark('${doc.id}')">
Delete
</button>

</div>
`;

box.innerHTML+=html;

});

});

}
</script>

</body>
  </html>
